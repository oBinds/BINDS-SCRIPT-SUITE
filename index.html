<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BINDS SCRIPT SUITE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{color:#fff;font-family:'Rajdhani',sans-serif;line-height:1.6;min-height:100vh;transition:background 0.5s;}
body.t-hub   {background:#04040c;background-image:radial-gradient(ellipse at 20% 30%,rgba(120,80,255,0.13) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(255,180,0,0.08) 0%,transparent 55%);}
body.t-multi {background:#010a03;background-image:radial-gradient(ellipse at 15% 50%,rgba(0,255,80,0.11) 0%,transparent 55%),radial-gradient(ellipse at 85% 30%,rgba(0,160,50,0.06) 0%,transparent 50%);}
body.t-fps   {background:#01030a;background-image:radial-gradient(ellipse at 20% 40%,rgba(58,190,255,0.11) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(0,80,200,0.07) 0%,transparent 50%);}
body.t-horror{background:#0a0101;background-image:radial-gradient(ellipse at 20% 40%,rgba(255,20,20,0.11) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(180,0,0,0.07) 0%,transparent 50%);}
.wrap{max-width:1020px;margin:0 auto;padding:36px 18px;}
header{text-align:center;margin-bottom:44px;}
.logo{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;letter-spacing:5px;color:#000;transition:text-shadow 0.5s;}
.logo.hub   {text-shadow:0 0 12px #fff,0 0 28px rgba(150,120,255,0.9),0 0 55px rgba(150,120,255,0.4);}
.logo.multi {text-shadow:0 0 12px #00ff50,0 0 28px rgba(0,255,80,0.8),0 0 55px rgba(0,255,80,0.3);}
.logo.fps   {text-shadow:0 0 12px #3ABEFF,0 0 28px rgba(58,190,255,0.8),0 0 55px rgba(58,190,255,0.3);}
.logo.horror{text-shadow:0 0 12px #ff2020,0 0 28px rgba(255,30,30,0.8),0 0 55px rgba(255,30,30,0.3);}
.sub{font-family:'Orbitron',sans-serif;font-size:0.75rem;color:#666;letter-spacing:4px;margin-top:7px;}
.atag{margin-top:9px;font-family:'Orbitron',sans-serif;font-size:0.65rem;letter-spacing:3px;color:#555;}
.hline{height:1px;width:280px;margin:18px auto 0;transition:background 0.5s;}
.hline.hub   {background:linear-gradient(90deg,transparent,rgba(150,120,255,0.7),transparent);}
.hline.multi {background:linear-gradient(90deg,transparent,#00ff50,transparent);}
.hline.fps   {background:linear-gradient(90deg,transparent,#3ABEFF,transparent);}
.hline.horror{background:linear-gradient(90deg,transparent,#ff2020,transparent);}body.t-cod{background:#0d0c02;background-image:radial-gradient(ellipse at 20% 40%,rgba(232,180,32,0.11) 0%,transparent 55%),radial-gradient(ellipse at 80% 60%,rgba(200,148,10,0.07) 0%,transparent 50%);}.logo.cod{text-shadow:0 0 12px #e8b420,0 0 28px rgba(232,180,32,0.8),0 0 55px rgba(232,180,32,0.3);}.hline.cod{background:linear-gradient(90deg,transparent,#e8b420,transparent);}

/* views */
.view{display:none;}
.view.on{display:block;}

/* hub cards */
.hub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;}
@property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}
@keyframes spin{to{--angle:360deg;}}
.hub-card{background:#0d0d1a;border:2px solid transparent;border-radius:16px;padding:38px 24px;cursor:pointer;transition:transform 0.28s,box-shadow 0.28s;position:relative;text-align:center;user-select:none;}
.hub-card::before{content:'';position:absolute;inset:-2px;border-radius:18px;z-index:0;background:conic-gradient(from var(--angle),var(--c),color-mix(in srgb,var(--c) 30%,#fff 70%),var(--c),color-mix(in srgb,var(--c) 15%,#000 85%),var(--c));animation:spin 3s linear infinite;}
.hub-card::after{content:'';position:absolute;inset:2px;border-radius:15px;background:#0d0d1a;z-index:1;}
.hub-card>*{position:relative;z-index:2;}
.hub-card:hover{transform:translateY(-7px);box-shadow:0 0 40px var(--c),0 0 80px color-mix(in srgb,var(--c) 40%,transparent);}
.hc-icon{font-size:2.6rem;margin-bottom:14px;}
.hc-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;letter-spacing:2px;color:var(--c);text-shadow:0 0 9px var(--c);margin-bottom:7px;}
.hc-desc{color:#666;font-size:0.88rem;margin-bottom:18px;}
.hc-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.gpill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:3px 11px;font-size:0.7rem;color:#aaa;font-family:'Orbitron',sans-serif;letter-spacing:1px;}

/* breadcrumb */
.bc{display:flex;align-items:center;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
.bc-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 14px;cursor:pointer;color:#bbb;font-family:'Orbitron',sans-serif;font-size:0.68rem;transition:all 0.2s;user-select:none;}
.bc-btn:hover{background:rgba(255,255,255,0.11);color:#fff;}
.bc-sep{color:#444;}
.bc-cur{font-family:'Orbitron',sans-serif;font-size:0.78rem;font-weight:700;}

/* game cards */
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;}
.game-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:26px 18px;cursor:pointer;transition:all 0.24s;text-align:center;position:relative;overflow:hidden;user-select:none;}
.game-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--c);box-shadow:0 0 12px var(--c);}
.game-card:hover{transform:translateY(-5px);border-color:var(--c);box-shadow:0 0 20px var(--c);}
.gc-icon{font-size:1.9rem;margin-bottom:9px;}
.gc-name{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;letter-spacing:1.5px;color:var(--c) !important;text-shadow:0 0 7px var(--c);margin-bottom:5px;}
.gc-desc{color:#666 !important;font-size:0.82rem;}

/* content tabs */
.ctabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px;}
.ctab{padding:8px 17px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:0.7rem;letter-spacing:1px;color:#666;transition:all 0.2s;user-select:none;}
.ctab:hover{background:rgba(255,255,255,0.08);color:#fff;}
.ctab.on{font-weight:700;color:#000;}

/* feature cards */
.features-grid{display:grid;gap:13px;}
.feature-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:17px;transition:all 0.2s;position:relative;}
.feature-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--card-accent,#fff);border-radius:3px 0 0 3px;box-shadow:0 0 9px var(--card-accent,#fff);}
.feature-card:hover{background:rgba(255,255,255,0.05);transform:translateX(4px);border-color:var(--card-accent,#fff);}
.page-label{display:inline-block;font-family:'Orbitron',sans-serif;font-size:0.57rem;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;margin-bottom:5px;font-weight:700;}
.feature-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.feature-name{font-family:'Orbitron',sans-serif;font-size:0.92rem;font-weight:700;}
.feature-combo{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.key{border-radius:5px;padding:4px 9px;font-family:'Orbitron',sans-serif;font-size:0.66rem;font-weight:700;color:#000;}
.feature-desc{font-size:0.92rem;line-height:1.6;color:#bbb;}

/* led */
.led-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px;}
.led-item{display:flex;align-items:center;gap:11px;padding:11px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);}
.led-dot{width:19px;height:19px;border-radius:50%;flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.led-label{font-size:0.88rem;color:#888;}
.led-label strong{color:#fff;}

/* quick ref */
.quick-ref{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:16px;overflow-x:auto;}
.quick-ref table{width:100%;border-collapse:collapse;}
.quick-ref th,.quick-ref td{padding:8px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);}
.quick-ref th{font-family:'Orbitron',sans-serif;font-size:0.66rem;letter-spacing:1.5px;text-transform:uppercase;}
.quick-ref tr:last-child td{border-bottom:none;}
.quick-ref tr:hover td{background:rgba(255,255,255,0.02);}

/* section header */
.sec-hdr{font-family:'Orbitron',sans-serif;font-size:0.95rem;font-weight:700;margin:24px 0 11px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);position:relative;}
.sec-hdr::after{content:'';position:absolute;bottom:-1px;left:0;width:42px;height:2px;background:currentColor;display:block;}

/* speed table */
.speed-table-placeholder{margin-top:8px;}
.stbl{max-height:185px;overflow-y:auto;border:1px solid #1a1a28;border-radius:6px;background:#05050d;}
.stbl table{width:100%;border-collapse:collapse;font-size:0.77rem;font-family:'Courier New',monospace;}
.stbl thead{position:sticky;top:0;background:#0a0a16;z-index:1;}
.stbl th{padding:4px 8px;text-align:left;border-bottom:1px solid #1a1a28;}
.stbl td{padding:2px 8px;}

/* subsec nav */
.snav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.spill{padding:5px 13px;border-radius:14px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);cursor:pointer;color:#666;font-size:0.7rem;font-family:'Orbitron',sans-serif;transition:all 0.17s;user-select:none;}
.spill:hover{background:rgba(255,255,255,0.08);color:#fff;}
.spill.on{font-weight:700;color:#000;}
.subsec{display:none;}
.subsec.vis{display:block;}

footer{text-align:center;padding:38px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:48px;}
footer p{color:#3a3a4a;font-size:0.85rem;margin-bottom:5px;}
.f-author{font-family:'Orbitron',sans-serif;font-weight:700;font-size:0.9rem;color:#555;}
@media(max-width:600px){.logo{font-size:1.75rem;}.feature-header{flex-direction:column;}}

    /* ── Key Gate ── */
    #key-gate{position:fixed;inset:0;background:#04040c;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;}
    #key-gate.hidden{display:none;}
    .gate-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;max-width:420px;width:90%;text-align:center;position:relative;}
    .gate-box::before{content:'';position:absolute;inset:-2px;border-radius:22px;z-index:-1;
      background:conic-gradient(from var(--angle,0deg),#00ff50,#3ABEFF,#ff2020,#e8b420,#00ff50);
      animation:borderSpin 4s linear infinite;}
    .gate-box::after{content:'';position:absolute;inset:1px;border-radius:19px;background:#04040c;z-index:-1;}
    .gate-logo{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:4px;margin-bottom:6px;
      background:linear-gradient(90deg,#00ff50,#3ABEFF,#ff2020,#e8b420);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .gate-sub{color:#444;font-size:0.8rem;letter-spacing:3px;margin-bottom:32px;font-family:'Orbitron',sans-serif;}
    .gate-input{width:100%;background:#080816;border:1px solid rgba(255,255,255,0.1);border-radius:10px;
      padding:14px 16px;color:#fff;font-family:'Courier New',monospace;font-size:1rem;letter-spacing:2px;
      outline:none;text-align:center;margin-bottom:16px;transition:border-color 0.2s;}
    .gate-input:focus{border-color:rgba(255,255,255,0.3);}
    .gate-btn{width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;
      font-family:'Orbitron',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:2px;
      background:linear-gradient(135deg,#00ff50,#3ABEFF);color:#000;transition:all 0.2s;}
    .gate-btn:hover{opacity:0.85;transform:translateY(-1px);}
    .gate-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
    .gate-err{color:#ff4444;font-size:0.82rem;margin-top:12px;min-height:20px;font-family:'Rajdhani',sans-serif;}
    .gate-ok{color:#00ff88;font-size:0.82rem;margin-top:12px;min-height:20px;}
    @property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}
    @keyframes borderSpin{to{--angle:360deg;}}

  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="t-hub">

<!-- KEY GATE -->
<div id="key-gate">
  <div class="gate-box">
    <div class="gate-logo">BINDS SCRIPTS</div>
    <div class="gate-sub">ENTER YOUR ACCESS KEY</div>
    <input class="gate-input" id="gate-key-input" type="text" placeholder="XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
    <button class="gate-btn" id="gate-submit-btn" onclick="checkKey()">UNLOCK ACCESS</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<div class="wrap">

<header>
  <h1 class="logo hub" id="logo">BINDS SCRIPT SUITE</h1>
  <p class="sub" id="sub">SELECT A SCRIPT TO GET STARTED</p>
  <p class="atag">Discord &amp; Instagram: @o.binds</p>
  <div class="hline hub" id="hline"></div>
</header>

<!-- HUB -->
<div class="view on" id="v-hub">
  <div class="hub-grid" id="hub-grid"></div>
</div>

<!-- GAMES -->
<div class="view" id="v-games">
  <div class="bc">
    <button class="bc-btn" id="btn-hub-from-games">&#8592; All Scripts</button>
    <span class="bc-sep">&#8250;</span>
    <span class="bc-cur" id="bc-script"></span>
  </div>
  <p style="color:#555;margin-bottom:18px;font-size:0.92rem;">Select a game to view its features</p>
  <div class="game-grid" id="game-grid"></div>
</div>

<!-- CONTENT -->
<div class="view" id="v-content">
  <div class="bc">
    <button class="bc-btn" id="btn-hub-from-content">&#8592; All Scripts</button>
    <span class="bc-sep">&#8250;</span>
    <button class="bc-btn" id="btn-games-from-content"></button>
    <span class="bc-sep">&#8250;</span>
    <span class="bc-cur" id="bc-game"></span>
  </div>
  <div class="ctabs" id="ctabs"></div>
  <div id="panel"></div>
</div>

<footer>
  <p>BINDS SCRIPT SUITE</p>
  <p class="f-author">Created by O.BINDS</p>
  <p style="margin-top:7px;font-size:0.78rem;">For use with Cronus Zen &nbsp;|&nbsp; @o.binds</p>
</footer>

</div>

    document.getElementById('logo').textContent = 'BINDS SCRIPT SUITE';
    document.getElementById('sub').textContent = 'SELECT A SCRIPT TO GET STARTED';
    showView('v-hub');
  }

  function pickScript(s) {
    curScript = s;
    var sc = SCRIPTS[s];
    setTheme(sc.theme, sc.color);
    document.getElementById('logo').textContent = sc.name;
    document.getElementById('sub').textContent = 'SELECT A GAME';

    var bcScr = document.getElementById('bc-script');
    bcScr.textContent = sc.name;
    bcScr.style.color = sc.color;
    bcScr.style.textShadow = '0 0 8px ' + sc.color;

    var grid = document.getElementById('game-grid');
    grid.style.setProperty('--c', sc.color);
    grid.innerHTML = sc.games.map(function(g){
      if (g.download) {
        return '<div class="game-card dl-card" data-action="download-script" data-script="' + s + '" style="--c:' + sc.color + ';border-style:dashed;">'
          + '<div class="gc-icon">' + g.icon + '</div>'
          + '<div class="gc-name" style="font-size:0.85rem;">DOWNLOAD</div>'
          + '<div class="gc-name">' + sc.name + '</div>'
          + '<div class="gc-desc">' + g.desc + '</div>'
          + '</div>';
      }
      return '<div class="game-card" data-action="pick-game" data-script="' + s + '" data-game="' + g.id + '" style="--c:' + sc.color + ';">'
        + '<div class="gc-icon">' + g.icon + '</div>'
        + '<div class="gc-name">' + g.name + '</div>'
        + '<div class="gc-desc">' + g.desc + '</div>'
        + '</div>';
    }).join('');
    showView('v-games');
  }

  function pickGame(s, gid) {
    var sc = SCRIPTS[s];
    var game = sc.games.find(function(g){ return g.id === gid; });
    setTheme(sc.theme, sc.color);
    document.getElementById('logo').textContent = sc.name;
    document.getElementById('sub').textContent = game.name;

    var bcGame = document.getElementById('bc-game');
    bcGame.textContent = game.name;
    bcGame.style.color = sc.color;
    bcGame.style.textShadow = '0 0 8px ' + sc.color;

    document.getElementById('btn-games-from-content').textContent = sc.name;

    var key = s + '-' + gid;
    var subs = SUBSECS[key];
    var ctabs = document.getElementById('ctabs');

    if (subs) {
      // render subsection pills as tabs
      ctabs.innerHTML = subs.map(function(sub, i){
        return '<button class="ctab' + (i===0?' on':'') + '" '
          + 'style="' + (i===0 ? 'background:' + sc.color + ';color:#000;' : '') + '" '
          + 'data-action="sub-tab" data-script="' + s + '" data-game="' + gid + '" data-sub="' + sub.id + '">'
          + sub.lb + '</button>';
      }).join('');
      loadSubPanel(s, gid, subs[0].id, sc.color);
    } else {
      ctabs.innerHTML = '';
      var content = P[key] || '<p style="color:#666;padding:20px;">Coming soon.</p>';
      document.getElementById('panel').innerHTML = content;
      injectSpeed(sc.color);
    }
    showView('v-content');
  }

  function loadSubPanel(s, gid, subId, color) {
    var key = s + '-' + gid + '-' + subId;
    document.getElementById('panel').innerHTML = P[key] || '<p style="color:#666;padding:20px;">Coming soon.</p>';
    injectSpeed(color);
  }

  // Build hub cards
  var hubGrid = document.getElementById('hub-grid');
  hubGrid.innerHTML = Object.keys(SCRIPTS).map(function(s){
    var sc = SCRIPTS[s];
    var icons = {multi:'🎮', fps:'🎯', horror:'🩸', cod:'🔫'};
    return '<div class="hub-card" data-action="pick-script" data-script="' + s + '" style="--c:' + sc.color + ';">'
      + '<div class="hc-icon">' + icons[s] + '</div>'
      + '<div class="hc-title">' + sc.name + '</div>'
      + '<div class="hc-desc">' + sc.games.filter(function(g){ return g.id !== 'nav' && g.id !== 'led' && g.id !== 'qref'; }).map(function(g){ return g.name; }).join(' · ') + '</div>'
      + '<div class="hc-pills">' + sc.games.filter(function(g){ return g.id !== 'nav' && g.id !== 'led' && g.id !== 'qref'; }).map(function(g){
          return '<span class="gpill">' + g.name + '</span>';
        }).join('') + '</div>'
      + '</div>';
  }).join('');

  // Single delegated click handler on body
  document.body.addEventListener('click', function(e) {
    var el = e.target;
    // walk up to find data-action
    while (el && el !== document.body) {
      var action = el.getAttribute('data-action');
      if (action) {
        e.preventDefault();
        if (action === 'pick-script') {
          pickScript(el.getAttribute('data-script'));
        } else if (action === 'pick-game') {
          pickGame(el.getAttribute('data-script'), el.getAttribute('data-game'));
        } else if (action === 'sub-tab') {
          var s = el.getAttribute('data-script');
          var gid = el.getAttribute('data-game');
          var sub = el.getAttribute('data-sub');
          var sc = SCRIPTS[s];
          document.querySelectorAll('.ctab').forEach(function(b){
            b.classList.remove('on'); b.style.background=''; b.style.color='';
          });
          el.classList.add('on'); el.style.background=sc.color; el.style.color='#000';
          loadSubPanel(s, gid, sub, sc.color);
        } else if (action === 'go-hub') {
          goHub();
        } else if (action === 'go-games') {
          pickScript(curScript);
        } else if (action === 'download-script') {
          var sc2 = el.getAttribute('data-script');
          var url = DL_URLS[sc2];
          if (url && url.indexOf('YOUR_') === -1) {
            window.open(url, '_blank');
          } else {
            alert('Download link not set yet. Contact @o.binds on Discord or Instagram to get the script.');
          }
        }
        return;
      }
      el = el.parentElement;
    }
  });

  document.getElementById('btn-hub-from-games').setAttribute('data-action','go-hub');
  document.getElementById('btn-hub-from-content').setAttribute('data-action','go-hub');
  document.getElementById('btn-games-from-content').setAttribute('data-action','go-games');

})();


  // ── Firebase Key Gate ──────────────────────────────────────────────────────
  var firebaseConfig = {
    apiKey: "AIzaSyCJlq0Thd3EZ3RrZoftwrqY0J9BgmNFS08",
    authDomain: "binds-scripts.firebaseapp.com",
    projectId: "binds-scripts",
    storageBucket: "binds-scripts.firebasestorage.app",
    messagingSenderId: "873797728162",
    appId: "1:873797728162:web:481a5a67d12d8f4908e4fb"
  };
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  var gateDb = firebase.firestore();

  // Recheck key active status every 30 seconds
  function startRecheckLoop(keyVal) {
    setInterval(async function(){
      try {
        var s = await gateDb.collection('keys').where('key','==',keyVal).limit(1).get();
        if (s.empty) { var d2 = await gateDb.collection('keys').doc(keyVal).get(); if (d2.exists) s = {empty:false,docs:[d2]}; }
        if (s.empty) { forceLogout(); return; }
        var kd = s.docs[0].data();
        var exp = kd.expires && (kd.expires.toDate ? kd.expires.toDate() : new Date(kd.expires)) < new Date();
        if (kd.active === false || exp) forceLogout();
      } catch(e){}
    }, 5000);
  }
  function forceLogout(msg) {
    localStorage.removeItem('binds_key');
    document.getElementById('key-gate').classList.remove('hidden');
    document.getElementById('gate-err').textContent = msg || '🔴 Your key has been deactivated.';
    document.getElementById('gate-key-input').value = '';
  }

  // Auto sign-in on load using saved key
  var storedKey = localStorage.getItem('binds_key');
  if (storedKey) {
    (async function(){
      try {
        var s = await gateDb.collection('keys').where('key','==',storedKey).limit(1).get();
        if (s.empty) { var d2 = await gateDb.collection('keys').doc(storedKey).get(); if (d2.exists) s = {empty:false,docs:[d2]}; }
        if (s.empty) { forceLogout('❌ Saved key not found. Please re-enter your key.'); return; }
        var kd = s.docs[0].data();
        if (kd.active === false) { forceLogout('🔴 Your key has been deactivated. Contact @o.binds.'); return; }
        if (kd.expires) { var exp = kd.expires.toDate ? kd.expires.toDate() : new Date(kd.expires); if (exp < new Date()) { forceLogout('⚠️ Your key has expired. Contact @o.binds.'); return; } }
        document.getElementById('key-gate').classList.add('hidden');
        startRecheckLoop(storedKey);
      } catch(e) { document.getElementById('key-gate').classList.add('hidden'); }
    })();
  }

  // Enter key support
  document.getElementById('gate-key-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') checkKey();
  });

  async function checkKey() {
    var raw = document.getElementById('gate-key-input').value.trim().toUpperCase();
    var errEl = document.getElementById('gate-err');
    var btn   = document.getElementById('gate-submit-btn');
    if (!raw) { errEl.textContent = 'Please enter your key.'; return; }
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'CHECKING...';
    try {
      // Query by key value
      var snap = await gateDb.collection('keys').where('key', '==', raw).limit(1).get();
      // Also try by document ID
      if (snap.empty) {
        var docSnap = await gateDb.collection('keys').doc(raw).get();
        if (docSnap.exists) {
          snap = { empty: false, docs: [docSnap] };
        }
      }
      if (snap.empty) {
        errEl.textContent = '❌ Key not found. Contact @o.binds on Discord.';
        btn.disabled = false; btn.textContent = 'UNLOCK ACCESS'; return;
      }
      var data = snap.docs[0].data();
      // Check active
      if (data.active === false) {
        errEl.textContent = '🔴 This key has been deactivated. Contact @o.binds.';
        btn.disabled = false; btn.textContent = 'UNLOCK ACCESS'; return;
      }
      // Check expiry
      if (data.expires) {
        var now = new Date();
        var exp = data.expires.toDate ? data.expires.toDate() : new Date(data.expires);
        if (exp < now) {
          errEl.textContent = '⚠️ This key has expired. Contact @o.binds.';
          btn.disabled = false; btn.textContent = 'UNLOCK ACCESS'; return;
        }
      }
      // Valid — unlock + update device count
      localStorage.setItem('binds_key', raw); startRecheckLoop(raw);
      var docId = snap.docs[0].id;
      var deviceId = localStorage.getItem('binds_device');
      if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).substr(2,9);
        localStorage.setItem('binds_device', deviceId);
      }
      // Record device in boundDevices array (matches key manager format)
      try {
        var boundDevices = data.boundDevices || [];
        if (!boundDevices.includes(deviceId)) {
          boundDevices.push(deviceId);
          await gateDb.collection('keys').doc(docId).update({ boundDevices: boundDevices });
        }
      } catch(de) { /* silent */ }
      document.getElementById('key-gate').classList.add('hidden');
      btn.disabled = false; btn.textContent = 'UNLOCK ACCESS';
    } catch(err) {
      errEl.textContent = 'Error: ' + err.message;
      btn.disabled = false; btn.textContent = 'UNLOCK ACCESS';
    }
  }
